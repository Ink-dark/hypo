name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Windows binary ─────────────────────────────
  build:
    name: Build (Windows MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --features cng --verbose --target-dir target

      - name: Set artifact name
        id: artifact
        shell: bash
        run: echo "name=hypo-${{ github.ref_name }}-x86_64-windows.exe" >> "$GITHUB_OUTPUT"

      - name: Locate binary
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Recurse target -Filter 'hypo.exe' | Where-Object { $_.FullName -match 'release' } | Select-Object -First 1
          if (-not $bin) { Write-Error "binary not found in target/**/release/"; exit 1 }
          Write-Host "Found: $($bin.FullName)"
          Copy-Item $bin.FullName "${{ steps.artifact.outputs.name }}"

      - name: Generate SHA256
        shell: bash
        run: sha256sum "${{ steps.artifact.outputs.name }}" > "${{ steps.artifact.outputs.name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            ${{ steps.artifact.outputs.name }}
            ${{ steps.artifact.outputs.name }}.sha256
          if-no-files-found: error

  # ── Create GitHub Release ────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: hypo ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true
