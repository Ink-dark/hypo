name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lint & Format ────────────────────────────────────
  lint:
    name: Lint & Format (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --features cng -- -D warnings

  # ── Build & Test ─────────────────────────────────────
  test:
    name: Test (Windows MSVC)
    needs: [lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose --features cng

      - name: Run tests
        run: cargo test --verbose --features cng

  # ── Security Audit ───────────────────────────────────
  security:
    name: Security Audit
    runs-on: windows-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

      - name: Verify no unsafe
        shell: bash
        run: |
          if grep -r "unsafe" src/ --include="*.rs" | grep -qv "forbid(unsafe_code)"; then
            echo "ERROR: unsafe code found"
            grep -rn "unsafe" src/ --include="*.rs" | grep -v "forbid(unsafe_code)"
            exit 1
          fi
