name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 代码质量 ────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── 文档检查 ────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── 测试矩阵 ────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSVC (crypto-cng)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust: stable
            sequoia-features: crypto-cng

          # Linux (crypto-nettle)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust: stable
            sequoia-features: crypto-nettle
            apt-deps: libnettle-dev pkg-config

          # macOS (crypto-nettle)
          - os: macos-latest
            target: x86_64-apple-darwin
            rust: stable
            sequoia-features: crypto-nettle
            brew-deps: nettle

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # 安装平台特定依赖
      - name: Install Linux deps
        if: matrix.apt-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt-deps }}

      - name: Install macOS deps
        if: matrix.brew-deps != ''
        run: brew install ${{ matrix.brew-deps }}

      # 用平台特定 crypto 后端构建
      - name: Build
        run: |
          cargo build --verbose --features ${{ matrix.sequoia-features }}
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      # 运行测试
      - name: Run tests
        run: |
          cargo test --verbose --features ${{ matrix.sequoia-features }}
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

  # ── 安全检查 ────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

      - name: Verify no unsafe
        run: |
          ! grep -r "unsafe" src/ --include="*.rs" || (echo "ERROR: unsafe code found" && exit 1)

  # ── MSRV 检查 (Minimum Supported Rust Version) ──────
  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.82

      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace
